name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Windows 用户版 ───────────────────────────────────────────
  build-win:
    name: Build Win (release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npm run build:release -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Win artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.exe
            dist/release/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── macOS 用户版 ─────────────────────────────────────────────
  build-mac:
    name: Build Mac (release)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS release
        run: npm run build:release -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.dmg
            dist/release/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
