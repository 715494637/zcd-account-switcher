<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZCode 切号器</title>
<style>
/* ===== DESIGN.md · OKLCH 暖纸/暖夜 token ===== */
:root {
  --bg: oklch(0.965 0.013 86); --surface: oklch(0.986 0.008 86);
  --surface-2: oklch(0.945 0.014 84); --surface-3: oklch(0.915 0.018 82);
  --rule: oklch(0.875 0.016 80); --rule-2: oklch(0.80 0.020 78);
  --ink: oklch(0.255 0.012 64); --ink-2: oklch(0.46 0.014 66);
  --ink-3: oklch(0.585 0.014 70); --ink-4: oklch(0.70 0.013 74);
  --accent: oklch(0.535 0.085 142); --accent-ink: oklch(0.46 0.082 142);
  --accent-soft: oklch(0.93 0.035 132); --accent-line: oklch(0.83 0.052 138);
  --on-accent: oklch(0.99 0.01 110);
  --danger: oklch(0.545 0.135 38); --danger-ink: oklch(0.49 0.125 36); --danger-soft: oklch(0.93 0.045 50);
  --warn: oklch(0.595 0.105 74); --warn-ink: oklch(0.46 0.10 70); --warn-soft: oklch(0.93 0.05 80);
  --ok: var(--accent);
  --mono: "JetBrains Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
  --r: 6px; --r-2: 10px; --nav-w: 56px;
}
:root[data-theme="dark"] {
  --bg: oklch(0.185 0.010 70); --surface: oklch(0.215 0.011 72);
  --surface-2: oklch(0.255 0.012 72); --surface-3: oklch(0.295 0.013 72);
  --rule: oklch(0.335 0.013 72); --rule-2: oklch(0.41 0.015 72);
  --ink: oklch(0.925 0.012 84); --ink-2: oklch(0.755 0.014 80);
  --ink-3: oklch(0.605 0.013 76); --ink-4: oklch(0.485 0.012 74);
  --accent: oklch(0.775 0.105 142); --accent-ink: oklch(0.80 0.105 142);
  --accent-soft: oklch(0.34 0.05 140); --accent-line: oklch(0.46 0.065 140);
  --on-accent: oklch(0.18 0.01 70);
  --danger: oklch(0.72 0.135 40); --danger-ink: oklch(0.745 0.13 40); --danger-soft: oklch(0.34 0.06 44);
  --warn: oklch(0.795 0.115 78); --warn-ink: oklch(0.83 0.12 80); --warn-soft: oklch(0.34 0.055 78);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.5;
  display: flex; height: 100vh; overflow: hidden; }
::selection { background: var(--accent-soft); color: var(--accent-ink); }
/* 左侧细图标导航 */
.nav { width: var(--nav-w); flex: 0 0 var(--nav-w); background: var(--surface); border-right: 1px solid var(--rule);
  display: flex; flex-direction: column; align-items: center; padding: 14px 0; gap: 6px; }
.nav-item { width: 40px; height: 40px; border-radius: var(--r-2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink-3); font-size: 19px; transition: .12s; position: relative; }
.nav-item:hover { background: var(--surface-2); color: var(--ink); }
.nav-item.active { background: var(--accent-soft); color: var(--accent-ink); }
.nav-item.active::before { content: ""; position: absolute; left: -14px; top: 9px; bottom: 9px; width: 3px;
  border-radius: 0 3px 3px 0; background: var(--accent); }
.nav .spacer { flex: 1; }
/* 主区 */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { height: 50px; flex: 0 0 50px; display: flex; align-items: center; gap: 12px; padding: 0 18px;
  border-bottom: 1px solid var(--rule); }
.zstate { font-family: var(--mono); font-size: 12px; color: var(--ink-3); letter-spacing: .05em; }
.zstate b { color: var(--accent-ink); } .zstate.off { color: var(--ink-4); } .zstate.off b { color: var(--ink-4); }
.zstate.warn { color: var(--warn-ink); cursor: default; } /* 未检测到 ZCode 安装 */
.topbar .spacer { flex: 1; }
.view-title { font-size: 15px; font-weight: 600; color: var(--ink); }
.body-scroll { flex: 1; overflow-y: auto; padding: 18px; }
/* 按钮 */
.btn { font-family: var(--mono); font-size: 13px; padding: 7px 13px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--rule-2); color: var(--ink-2); cursor: pointer; transition: .12s; }
.btn:hover { background: var(--surface-2); border-color: var(--ink-4); color: var(--ink); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
.btn-primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); color: var(--on-accent); }
.btn-danger { color: var(--danger-ink); } .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger-ink); }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 7px; }
/* 图标按钮（次要操作，悬停提示）*/
.ibtn { width: 34px; height: 34px; border-radius: 8px; background: var(--surface); border: 1px solid var(--rule);
  color: var(--ink-3); cursor: pointer; font-size: 15px; display: inline-flex; align-items: center; justify-content: center;
  transition: .12s; position: relative; }
.ibtn:hover { background: var(--surface-2); color: var(--ink); border-color: var(--ink-4); }
.ibtn:disabled { opacity: .35; cursor: not-allowed; }
.ibtn[data-tip]:hover::after { content: attr(data-tip); position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
  white-space: nowrap; font-family: var(--mono); font-size: 11px; padding: 3px 7px; border-radius: 5px;
  background: var(--ink); color: var(--bg); z-index: 50; }
.tool { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tool .spacer { flex: 1; }
.tool .sep { width: 1px; height: 22px; background: var(--rule); margin: 0 2px; }
/* 统计 + 过滤 */
.stat { font-family: var(--mono); font-size: 12px; color: var(--ink-3); }
.stat b { color: var(--ink); } .stat .g { color: var(--accent-ink); } .stat .r { color: var(--danger-ink); }
.filters { display: flex; gap: 5px; }
.filter { font-family: var(--mono); font-size: 12px; padding: 4px 10px; border-radius: 999px; cursor: pointer;
  background: var(--surface); border: 1px solid var(--rule); color: var(--ink-3); }
.filter.active { background: var(--accent-soft); border-color: var(--accent-line); color: var(--accent-ink); }
/* 卡片 */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.card { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--r-2); padding: 14px;
  transition: .12s; position: relative; }
.card:hover { border-color: var(--rule-2); box-shadow: 0 2px 10px oklch(0 0 0 / .04); }
.card.current { border-color: var(--accent-line); box-shadow: 0 0 0 1px var(--accent-line); }
.card.dead { opacity: .55; }
.card-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
.card-check { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); flex: 0 0 auto;
  opacity: .55; transition: .12s; }
.card:hover .card-check, .card-check:checked { opacity: 1; }
.card-id { font-family: var(--mono); font-weight: 600; font-size: 13.5px; color: var(--ink); }
.card-email { font-size: 11.5px; color: var(--ink-3); word-break: break-all; line-height: 1.35; }
.card-head .spacer { flex: 1; }
.chip { font-family: var(--mono); font-size: 10.5px; padding: 2px 7px; border-radius: 999px; white-space: nowrap; flex: 0 0 auto; }
.chip-on { background: var(--accent-soft); color: var(--accent-ink); }
.chip-warn { background: var(--warn-soft); color: var(--warn); }
.chip-err { background: var(--danger-soft); color: var(--danger-ink); }
.chip-off { background: var(--surface-3); color: var(--ink-3); }
/* 额度条 */
.quota-row { margin: 7px 0; }
.quota-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); margin-bottom: 3px; }
.bar { height: 6px; border-radius: 999px; background: var(--surface-3); overflow: hidden; }
.bar > i { display: block; height: 100%; border-radius: 999px; background: var(--accent); transition: width .3s; }
.bar.warn > i { background: var(--warn); } .bar.danger > i { background: var(--danger); }
.meta-line { font-family: var(--mono); font-size: 10.5px; color: var(--ink-4); margin-top: 7px; display: flex; justify-content: space-between; }
.meta-line .exp-soon { color: var(--warn-ink); } .meta-line .exp-over { color: var(--danger-ink); }
.q-loading, .q-err { font-family: var(--mono); font-size: 10.5px; color: var(--ink-4); }
.q-err { color: var(--danger-ink); }
/* 卡片操作：主按钮常显，次操作悬停浮现 */
.card-actions { display: flex; gap: 6px; margin-top: 11px; align-items: center; }
.card-actions .spacer { flex: 1; }
.card-mini { opacity: 0; transition: .12s; }
.card:hover .card-mini { opacity: 1; }
/* 注册机视图 */
.reg-grid { display: grid; grid-template-columns: 420px minmax(0, 1fr); gap: 18px; min-height: 100%; align-items: start; }
.reg-left { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
.panel { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--r-2); padding: 18px; position: relative; display: flex; flex-direction: column; min-height: 0; }
.panel h4 { font-family: var(--mono); font-size: 12px; color: var(--ink-3); letter-spacing: .06em;
  text-transform: uppercase; margin-bottom: 10px; }
.captcha-box { min-height: 60px; border-radius: var(--r); border: 1px dashed var(--rule-2); background: var(--surface-2);
  display: flex; align-items: center; justify-content: center; padding: 10px; }
.captcha-box .hint { font-family: var(--mono); font-size: 12px; color: var(--ink-4); }
.reg-status { font-family: var(--mono); font-size: 11.5px; color: var(--ink-3); margin-top: 8px; min-height: 18px; }
.reg-status.ok { color: var(--accent-ink); } .reg-status.err { color: var(--danger-ink); }
.batch-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; flex-shrink: 0; }
.batch-head .spacer { flex: 1; }
.batch-tag { font-family: var(--mono); font-size: 11px; color: var(--ink-4); padding: 2px 8px; border-radius: 999px; background: var(--surface-2); }
.reg-rows { display: flex; flex-direction: column; gap: 7px; overflow-y: auto; flex: 1; min-height: 0; }
.reg-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: var(--surface);
  border: 1px solid var(--rule); border-radius: var(--r); font-size: 13px; }
.reg-row input { accent-color: var(--accent); }
.reg-row .em { font-family: var(--mono); font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.reg-row.running { border-color: var(--warn-soft); }
.reg-row.error { border-color: var(--danger-soft); }
/* modal */
.mask { position: fixed; inset: 0; background: oklch(0 0 0 / .4); display: none; align-items: center; justify-content: center; z-index: 90; }
.mask.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--rule-2); border-radius: var(--r-2); padding: 18px; width: 520px; max-width: 92vw; }
.modal-sm { width: 380px; }
.modal-head { display: flex; align-items: center; margin-bottom: 8px; }
.modal-head h3 { font-family: var(--mono); font-size: 14px; flex: 1; letter-spacing: .03em; }
.modal-x { cursor: pointer; color: var(--ink-4); padding: 2px 6px; border-radius: var(--r); }
.modal-x:hover { background: var(--surface-2); color: var(--ink); }
.modal .hint { font-size: 12px; color: var(--ink-4); margin: 6px 0 10px; }
.modal code { font-family: var(--mono); background: var(--surface-2); padding: 1px 5px; border-radius: 4px; color: var(--accent-ink); font-size: 11px; }
.modal textarea { width: 100%; height: 180px; font-family: var(--mono); font-size: 12px; padding: 10px;
  background: var(--bg); border: 1px solid var(--rule); border-radius: var(--r); color: var(--ink); resize: vertical; }
.confirm-body { font-size: 13px; color: var(--ink-2); line-height: 1.6; white-space: pre-line; margin: 4px 0; }
.paste-wrap { position: relative; }
.paste-badge { position: absolute; right: 10px; bottom: 10px; font-family: var(--mono); font-size: 11px;
  padding: 2px 9px; border-radius: 999px; background: var(--surface-3); color: var(--ink-3); pointer-events: none; }
.paste-badge.ok { background: var(--accent-soft); color: var(--accent-ink); }
.paste-badge.err { background: var(--danger-soft); color: var(--danger-ink); }
.ck-inline { font-family: var(--mono); font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.ck-inline input { accent-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
.modal-actions .spacer { flex: 1; }
.empty { text-align: center; padding: 50px 20px; color: var(--ink-4); font-family: var(--mono); font-size: 13px; }
.toasts { position: fixed; right: 16px; bottom: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
.toast { font-family: var(--mono); font-size: 13px; padding: 9px 13px; border-radius: var(--r); background: var(--surface);
  border: 1px solid var(--rule-2); color: var(--ink); min-width: 200px; display: flex; gap: 8px; align-items: center;
  box-shadow: 0 6px 20px oklch(0 0 0 / .12); animation: tin .2s; }
.toast.ok { border-color: var(--accent-line); } .toast.ok .ic { color: var(--accent); }
.toast.err { border-color: var(--danger-ink); } .toast.err .ic { color: var(--danger); }
@keyframes tin { from { opacity: 0; transform: translateY(8px); } }
.spin { display: inline-block; width: 11px; height: 11px; border: 2px solid var(--ink-4); border-top-color: transparent;
  border-radius: 999px; animation: sp .7s linear infinite; vertical-align: middle; }
@keyframes sp { to { transform: rotate(360deg); } }
.view { display: none; height: 100%; } .view.active { display: block; }
/* 清废号：简约文字按钮，陶土红字 */
.btn-dead { color: var(--danger-ink); border-color: var(--rule-2); }
.btn-dead:hover { background: var(--danger-soft); border-color: var(--danger-ink); color: var(--danger-ink); }
/* 全选小图标（统计行最左）*/
.ibtn-mini { width: 26px; height: 26px; border-radius: 6px; background: var(--surface); border: 1px solid var(--rule);
  color: var(--ink-3); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; }
.ibtn-mini:hover { background: var(--surface-2); color: var(--ink); }
.ibtn-mini.on { background: var(--accent-soft); border-color: var(--accent-line); color: var(--accent-ink); }
/* 内联选中提示（不占整行，不推布局）*/
.sel-inline.hidden { display: none; }
.sel-inline b { color: var(--accent-ink); }
.sel-inline a { color: var(--accent-ink); cursor: pointer; margin-left: 6px; text-decoration: underline; }
.sel-inline a.r { color: var(--danger-ink); }
/* 注册验证区域：紧凑设计，弹窗脱离容器 */
.reg-captcha-panel { display: flex; flex-direction: column; gap: 14px; padding: 0; }
.reg-tip { font-family: var(--mono); font-size: 12px; color: var(--ink-3); line-height: 1.5; padding: 2px 0; }
#regCaptchaHolder { width: 100%; min-height: 72px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px dashed var(--rule-2); border-radius: var(--r-2); padding: 12px;
  position: relative; transition: border-color 0.2s; }
#regCaptchaHolder:hover { border-color: var(--accent-line); }
#regCaptchaHolder .hint { font-family: var(--mono); font-size: 12px; color: var(--ink-4); }
.reg-status { font-family: var(--mono); font-size: 11.5px; color: var(--ink-3); min-height: 18px; line-height: 1.4; }
.reg-status.ok { color: var(--accent-ink); }
.reg-status.err { color: var(--danger-ink); }
/* 阿里云验证码弹窗居中：定位由 app.js 的 startCaptchaPopupFixer() 用 JS 接管
   （根因是祖先容器 transform 创建了 fixed 包含块，纯 CSS 改 top/left 无效）。
   这里只保证 z-index 够高 + 提供遮罩外观，定位/居中交给 JS。 */
body [id^="aliyunCaptcha-window-"]:not([id*="embed"]) { z-index: 999999 !important; }
body [id*="aliyun"][id*="mask"], body .nc-mask {
  position: fixed !important;
  inset: 0 !important;
  z-index: 999998 !important;
  background: oklch(0 0 0 / .48) !important;
}
@media (max-width: 760px) {
  .reg-grid { grid-template-columns: 1fr; }
}
/* 注册行：可展开看流程 */
.reg-row { flex-direction: column; align-items: stretch; gap: 0; padding: 0; overflow: hidden; }
.reg-row-main { display: flex; align-items: center; gap: 10px; padding: 9px 11px; cursor: pointer; }
.reg-row-main:hover { background: var(--surface-2); }
.reg-row .caret { color: var(--ink-4); font-size: 11px; transition: transform .15s; }
.reg-row.open .caret { transform: rotate(90deg); }
.reg-steps { display: none; padding: 8px 12px 10px 33px; border-top: 1px solid var(--rule); background: var(--bg); }
.reg-row.open .reg-steps { display: block; }
.reg-step { font-family: var(--mono); font-size: 11px; color: var(--ink-3); padding: 2px 0; display: flex; gap: 7px; }
.reg-step .dot { color: var(--accent); }
.reg-step.err .dot { color: var(--danger); } .reg-step.err { color: var(--danger-ink); }
</style>
</head>
<body>
<!-- 左侧细图标导航 -->
<div class="nav">
  <div class="nav-item active" data-view="pool" title="账号池">▣</div>
  <div class="nav-item dev-only" data-view="reg" title="注册机" style="display:none">＋</div>
  <div class="spacer"></div>
  <div class="nav-item" id="navBuy" title="购买账号">🛒</div>
  <div class="nav-item" id="navTheme" title="切换主题">◐</div>
</div>

<div class="main">
  <div class="topbar">
    <span class="view-title" id="viewTitle">账号池</span>
    <span class="zstate" id="zstate">● ZCODE …</span>
    <div class="spacer"></div>
    <button class="btn btn-sm" id="buyBtn">🛒 购买账号</button>
  </div>

  <!-- 账号池视图 -->
  <div class="view active" id="view-pool">
    <div class="body-scroll">
      <div class="tool">
        <button class="btn btn-primary" id="autoBtn">自动选最优号</button>
        <button class="btn" id="refreshBtn">刷新额度</button>
        <div class="sep"></div>
        <button class="btn btn-sm" id="importBtn">＋ 导入</button>
        <button class="btn btn-sm" id="exportBtn">⇪ 导出</button>
        <button class="btn btn-sm btn-dead" id="clearDeadBtn">清废号</button>
        <div class="spacer"></div>
        <div class="filters" id="filters">
          <span class="filter active" data-f="all">全部</span>
          <span class="filter" data-f="usable">可用</span>
          <span class="filter" data-f="dead">废号</span>
        </div>
      </div>
      <div class="tool" style="margin-bottom:14px;gap:12px">
        <button class="ibtn-mini" id="selectAllBtn" title="全选/取消全选">☰</button>
        <span class="stat">总数 <b id="sTotal">—</b></span>
        <span class="stat">可用 <b class="g" id="sUsable">—</b></span>
        <span class="stat">废号 <b class="r" id="sDead">—</b></span>
        <span class="stat sel-inline hidden" id="selInline">已选 <b id="selCount">0</b>
          <a id="selExportBtn">导出</a> <a id="selDelBtn" class="r">删除</a> <a id="selClearBtn">取消</a>
        </span>
        <div class="spacer"></div>
        <span class="stat" id="sCurrent"></span>
        <span class="stat" id="refreshProg" style="display:none;margin-left:10px"></span>
      </div>
      <div class="cards" id="cards"></div>
      <div class="empty" id="empty" style="display:none">还没有账号 — 点 ＋导入 粘贴卡密，或点右上「购买账号」</div>
    </div>
  </div>

  <!-- 注册机视图（dev）-->
  <div class="view" id="view-reg">
    <div class="body-scroll">
      <div class="reg-grid">
        <div class="reg-left">
          <div class="panel reg-captcha-panel">
            <div class="reg-tip">拖动滑块即注册一个号，连续过可批量注册</div>
            <div id="regCaptchaHolder"><span class="hint">正在加载滑块…</span></div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
              <div class="reg-status" id="regStatus" style="flex:1"></div>
              <button class="btn btn-sm" id="captchaRefreshBtn" title="验证码失效时点此重置" style="flex-shrink:0;opacity:.7">↻ 刷新</button>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="batch-head">
            <b style="font-size:13px">当前批次</b>
            <span class="batch-tag" id="batchTag">—</span>
            <div class="spacer"></div>
            <button class="btn btn-sm" id="regSelectAll">全选</button>
            <button class="btn btn-sm" id="regCopyBtn">复制卡密</button>
            <button class="btn btn-sm" id="regExportBtn">导出文件</button>
            <button class="btn btn-sm" id="regImportBtn">导入切号池</button>
            <button class="btn btn-sm btn-danger" id="regEndBtn">结束批次</button>
          </div>
          <div class="reg-rows" id="regRows"></div>
          <div class="empty" id="regEmpty">批次为空 — 拖左侧滑块开始注册</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 导入弹窗 -->
<div class="mask" id="importMask">
  <div class="modal">
    <div class="modal-head"><h3>导入账号</h3><span class="modal-x" id="importX">✕</span></div>
    <p class="hint">粘贴卡密（每行一张 <code>ZC1.</code>）或点「选择文件」。按账号去重，已有的跳过。</p>
    <div class="paste-wrap">
      <textarea id="importText" placeholder="ZC1.xxxxx&#10;ZC1.yyyyy"></textarea>
      <div class="paste-badge" id="importBadge">等待粘贴</div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="importFileBtn">选择文件</button>
      <div class="spacer"></div>
      <button class="btn" id="importCancelBtn">取消</button>
      <button class="btn btn-primary" id="importOkBtn" disabled>导入</button>
    </div>
  </div>
</div>

<!-- 导出卡密弹窗（dev）-->
<div class="mask" id="exportMask">
  <div class="modal">
    <div class="modal-head"><h3>导出卡密</h3><span class="modal-x" id="exportX">✕</span></div>
    <p class="hint" id="exportHint">—</p>
    <div class="paste-wrap"><textarea id="exportText" readonly placeholder="卡密将显示在这里"></textarea></div>
    <div class="modal-actions">
      <label class="ck-inline"><input type="checkbox" id="exportUnsoldOnly" checked> 仅未售</label>
      <div class="spacer"></div>
      <button class="btn" id="exportCopyBtn">复制全部</button>
      <button class="btn" id="exportSaveBtn">导出 .txt</button>
      <button class="btn btn-primary" id="exportSoldBtn">标记已售并结束</button>
    </div>
  </div>
</div>

<!-- 通用确认 -->
<div class="mask" id="confirmMask">
  <div class="modal modal-sm">
    <div class="modal-head"><h3 id="confirmTitle">确认</h3></div>
    <p class="confirm-body" id="confirmBody">—</p>
    <div class="modal-actions"><div class="spacer"></div>
      <button class="btn" id="confirmCancel">取消</button>
      <button class="btn btn-primary" id="confirmOk">确定</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>
<script src="app.js"></script>
</body>
</html>
